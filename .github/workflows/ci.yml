name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Race
        run: go test -race ./...

      - name: Compile examples
        run: go test ./examples/...

      - name: Run deterministic examples
        run: |
          go run ./examples/memory_tools
          go run ./examples/session_resume
          go run ./examples/advanced_stack
          go run ./examples/ci_embedding
